# Smithery configuration — https://smithery.ai/docs/build/project-config
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      freeLimit:
        type: integer
        title: Free result limit
        default: 10
    required: []
  commandFunction: |-
    (config) => ({
      command: 'python',
      args: ['src/server.py'],
      env: { REALESTATE_FREE_LIMIT: String(config.freeLimit || 10) }
    })
